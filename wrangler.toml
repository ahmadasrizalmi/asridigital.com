# Cloudflare Pages configuration
name = "asridigital-com"
compatibility_date = "2024-01-01"
pages_build_output_dir = "./dist"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "asri-digital-db"
database_id = "20495966-0e22-435e-b01b-bc3db9457312"

# Environment variables declarations
# Actual secret values are set in CF Pages Dashboard (encrypted)
# Dashboard values override these defaults at deploy time
[vars]
APP_URL = "https://asridigital.com"
DOMPETX_API_URL = "https://api.dompetx.com/v1"
DOMPETX_API_KEY = ""
JWT_SECRET = ""
RESEND_API_KEY = ""
TELEGRAM_BOT_TOKEN = ""
TELEGRAM_CHAT_ID = "964290305"
